<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>EXNA FM - A Rádio que toca todas!</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EXNA FM">
  <link rel="apple-touch-icon" href="logo-quadrada.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
    html, body { background: #0d041a; height: 100vh; height: -webkit-fill-available; overflow: hidden; }
    body { display: flex; flex-direction: column; justify-content: space-between; color: #fff; position: relative; }
    .bg-blur { position: absolute; top: -10%; left: -10%; right: -10%; bottom: -10%; background: url('logo-quadrada.png') no-repeat center center; background-size: cover; filter: blur(55px) brightness(0.24); z-index: -1; animation: movimientoFundo 20s ease-in-out infinite alternate; }
    @keyframes movimientoFundo { 0% { transform: scale(1) translate(0, 0); } 50% { transform: scale(1.1) translate(1%, 2%); } 100% { transform: scale(1.04) translate(-1%, -1%); } }
    header { display: flex; justify-content: space-between; align-items: center; padding: calc(12px + env(safe-area-inset-top)) 20px 12px 20px; background: rgba(13, 4, 26, 0.75); backdrop-filter: blur(30px); border-bottom: 1px solid rgba(255, 255, 255, 0.06); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); z-index: 10; }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-img { width: 42px; height: 42px; border-radius: 10px; object-fit: cover; mix-blend-mode: screen; }
    .titulo-radio h1 { font-size: 20px; font-weight: 900; letter-spacing: 1.2px; background: linear-gradient(135deg, #ffffff, #c5c5c5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; }
    .titulo-radio p { font-size: 9px; color: #ff2d55; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }
    .redes-sociais { display: flex; gap: 16px; }
    .redes-sociais a { color: #fff; font-size: 18px; text-decoration: none; opacity: 0.8; }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 5; }
    .player-layout { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; width: 100%; max-width: 500px; margin: 0 auto; }
    .capa-wrapper { width: 100%; max-width: 280px; aspect-ratio: 1 / 1; border-radius: 28px; overflow: hidden; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.08); background: #000; margin: 0 auto; }
    .capa-streaming { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease; }
    .tocando .capa-streaming { transform: scale(1.03); }
    .player-container { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px) saturate(140%); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px; padding: 20px 25px; width: 100%; text-align: center; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); }
    @media (min-width: 768px) and (orientation: landscape) {
      .player-layout { flex-direction: row; max-width: 1100px; gap: 40px; align-items: center; }
      .capa-wrapper { max-width: 320px; flex-shrink: 0; }
      .player-container { max-width: 550px; padding: 30px 35px; }
    }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(255, 45, 85, 0.12); color: #ff2d55; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; border: 1px solid rgba(255, 45, 85, 0.2); }
    .status-badge .ponto-pisca { width: 5px; height: 5px; background-color: #ff2d55; border-radius: 50%; animation: piscar 1.6s infinite; }
    @keyframes piscar { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    .container-letreiro { width: 100%; overflow: hidden; white-space: nowrap; margin-bottom: 4px; }
    #txtFrase { display: inline-block; font-size: 19px; font-weight: 700; padding-left: 100%; animation: barraTexto 14s linear infinite; }
    @keyframes barraTexto { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
    .info-musica p { font-size: 13px; color: rgba(255, 255, 255, 0.45); margin-bottom: 18px; font-weight: 600; }
    .btn-play-live { width: 72px; height: 72px; border-radius: 50%; background: #fff; color: #000; font-size: 26px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2); margin: 0 auto; }
    .espectro-container { display: flex; align-items: flex-end; justify-content: center; gap: 4px; width: 100%; height: 40px; margin-top: 25px; margin-bottom: 10px; opacity: 0.45; }
    @media (max-width: 767px) { .espectro-container { max-width: 290px; margin-left: auto; margin-right: auto; } }
    @media (min-width: 768px) and (orientation: landscape) { .espectro-container { max-width: 100%; } }
    .barra-espectro { flex: 1; height: 3px; background: linear-gradient(to top, #00f2fe, #9b51e0, #ff2d55); border-radius: 3px; box-shadow: 0 0 8px rgba(155, 81, 224, 0.6), 0 0 15px rgba(255, 45, 85, 0.4); }
    .animar .barra-espectro { animation: puloEspectro 0.5s ease infinite alternate; }
    .animar .barra-espectro:nth-child(4n+1) { animation-duration: 0.6s; }
    .animar .barra-espectro:nth-child(4n+2) { animation-duration: 0.4s; animation-delay: 0.1s; }
    .animar .barra-espectro:nth-child(4n+3) { animation-duration: 0.7s; animation-delay: 0.2s; }
    .animar .barra-espectro:nth-child(4n+4) { animation-duration: 0.5s; animation-delay: 0.15s; }
    .carregando-espectro .barra-espectro { animation: puloCarregando 1s ease infinite alternate; }
    @keyframes puloCarregando { 0% { height: 3px; opacity: 0.2; } 100% { height: 15px; opacity: 0.6; } }
    @keyframes puloEspectro { 0% { height: 4px; } 100% { height: 38px; } }
    footer { text-align: center; padding: 12px 14px calc(12px + env(safe-area-inset-bottom)) 14px; background: rgba(13, 4, 26, 0.85); backdrop-filter: blur(20px); font-size: 12px; color: rgba(255, 255, 255, 0.35); border-top: 1px solid rgba(255, 255, 255, 0.05); width: 100%; z-index: 10; }
  </style>
</head>
<body>
<div class="bg-blur" id="fundoDinamico"></div>
<header>
  <div class="logo-area"><img src="logo-quadrada.png" alt="Logo EXNA FM" class="logo-img"><div class="titulo-radio"><h1>EXNA FM</h1><p>A Rádio que toca todas!</p></div></div>
  <div class="redes-sociais"><a href="https://www.instagram.com/naldoaoficial" target="_blank"><i class="fab fa-instagram"></i></a><a href="https://www.tiktok.com/@djnaldoaoficial" target="_blank"><i class="fab fa-tiktok"></i></a><a href="https://youtube.com/@djnaldoaoficial" target="_blank"><i class="fab fa-youtube"></i></a></div>
</header>
<main>
  <div class="player-layout">
    <div class="capa-wrapper"><img src="logo-quadrada.png" id="capaRadio" alt="Capa EXNA" class="capa-streaming"></div>
    <div class="player-container" id="playerCard">
      <div class="status-badge"><div class="ponto-pisca"></div>Ao Vivo</div>
      <div class="info-musica"><div class="container-letreiro"><span id="txtFrase">EXNA FM - SINTONIZANDO ÁUDIO...</span></div><p>Sintonizado no Melhor Ritmo</p></div>
      <div class="controles"><button class="btn-play-live" id="btnPlayLive"><i class="fas fa-play" id="iconePlay"></i></button></div>
      <div class="espectro-container" id="espectroLuz"><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div><div class="barra-espectro"></div></div>
    </div>
  </div>
</main>
<footer><p>EXNA FM &copy; 2026</p></footer>
<audio id="audioRadio" crossorigin="anonymous"></audio>

<script>
  (function() {
    // ========== CONFIGURAÇÃO DO GOOGLE DRIVE ==========
    const API_KEY = 'AIzaSyBVpSXuoQT0jjh6nqzKo5U1IYlaP_qolSs';
    const PASTA_ID = '1vcukZmaqRgdkg6hEe-zgMjY7H9VwwY9J';
    
    const audio = document.getElementById('audioRadio');
    const btnPlayLive = document.getElementById('btnPlayLive');
    const iconePlay = document.getElementById('iconePlay');
    const playerCard = document.getElementById('playerCard');
    const txtFrase = document.getElementById('txtFrase');
    const capaRadio = document.getElementById('capaRadio');
    const fundoDinamico = document.getElementById('fundoDinamico');
    const espectroLuz = document.getElementById('espectroLuz');

    let musicas = [];
    let vinhetas = [];
    let indiceMusicaAtual = 0;
    let tocandoVinheta = false;
    let modoVinhetaAtivo = true;
    let proximoPreload = null;
    let jaSintonizouPrimeiraVez = false;
    let ultimoTimestampPlay = 0;
    const DURACAO_FAIXA_ESTIMADA = 180;

    let capaCache = new Map();

    function isVinheta(nome) { return nome.toLowerCase().includes("vinheta"); }

    function formatarNomeMusica(item) {
      let nome = item.name.replace(/\.(mp3|wav|ogg|m4a|aac|flac|webm)$/i, '').replace(/^\d+\s*/, '').replace(/[-_]/g, ' ').trim();
      return nome.toUpperCase() + "  •  EXNA FM";
    }

    function formatarNomeVinheta(nomeArquivo) {
      let nome = nomeArquivo.replace(/\.(mp3|wav|ogg|m4a|aac|flac|webm)$/i, '').replace(/[-_]/g, ' ');
      nome = nome.replace(/^\d*\s*vinheta\s*/i, '').replace(/vinheta\s*/i, '');
      if (nome.trim() === "") nome = "Vinheta";
      return `🔊 VINHETA: ${nome.toUpperCase()}`;
    }

    async function buscarCapaInteligente(item) {
      if (isVinheta(item.name)) return "logo-quadrada.png";
      
      let nomeBusca = item.name.replace(/\.(mp3|wav|ogg|m4a|aac|flac|webm)$/i, '').replace(/^\d+\s*/, '').replace(/[-_]/g, ' ');
      
      if (capaCache.has(nomeBusca)) return capaCache.get(nomeBusca);
      
      async function tentarBusca(query, tipo) {
        try {
          if (tipo === 'itunes') {
            const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=1`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (data.results && data.results[0]) {
              let capa = data.results[0].artworkUrl100;
              if (capa) return capa.replace('100x100bb.jpg', '600x600bb.jpg');
            }
          } else if (tipo === 'deezer') {
            const url = `https://api.deezer.com/search?q=${encodeURIComponent(query)}&limit=1`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (data.data && data.data[0]) {
              return data.data[0].album.cover_xl;
            }
          }
        } catch(e) {}
        return null;
      }
      
      let capaUrl = await tentarBusca(nomeBusca, 'itunes');
      if (!capaUrl) capaUrl = await tentarBusca(nomeBusca, 'deezer');
      if (!capaUrl) capaUrl = "logo-quadrada.png";
      
      capaCache.set(nomeBusca, capaUrl);
      return capaUrl;
    }

    async function atualizarInterface(item, isVinhetaFlag) {
      if (isVinhetaFlag) {
        txtFrase.innerText = formatarNomeVinheta(item.name);
        capaRadio.src = "logo-quadrada.png";
        fundoDinamico.style.backgroundImage = "url('logo-quadrada.png')";
      } else {
        txtFrase.innerText = formatarNomeMusica(item);
        const capaUrl = await buscarCapaInteligente(item);
        capaRadio.src = capaUrl;
        fundoDinamico.style.backgroundImage = `url('${capaUrl}')`;
      }
      if ('mediaSession' in navigator) {
        let titulo = isVinhetaFlag ? formatarNomeVinheta(item.name) : formatarNomeMusica(item);
        navigator.mediaSession.metadata = new MediaMetadata({
          title: titulo,
          artist: isVinhetaFlag ? 'EXNA FM - Vinheta' : 'EXNA FM - AO VIVO',
          album: 'A RÁDIO QUE TOCA TODAS!',
          artwork: [{ src: capaRadio.src, sizes: '600x600', type: 'image/jpeg' }]
        });
        navigator.mediaSession.setActionHandler('play', comandarPlayer);
        navigator.mediaSession.setActionHandler('pause', comandarPlayer);
      }
    }

    // ========== BUSCAR ARQUIVOS DO GOOGLE DRIVE ==========
    async function listarArquivosDaPasta() {
      const url = `https://www.googleapis.com/drive/v3/files?q='${PASTA_ID}'+in+parents+and+(mimeType+contains+'audio')&key=${API_KEY}&fields=files(id,name,webContentLink,mimeType)`;
      
      try {
        const resposta = await fetch(url);
        const dados = await resposta.json();
        
        if (!dados.files || dados.files.length === 0) {
          console.warn("Nenhum arquivo encontrado na pasta");
          return [];
        }
        
        return dados.files.map(file => ({
          id: file.id,
          name: file.name,
          url: `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media&key=${API_KEY}`,
          mimeType: file.mimeType
        }));
      } catch (erro) {
        console.error("Erro ao listar arquivos do Google Drive:", erro);
        return [];
      }
    }

    function salvarPlaylistCache() {
      const cacheObj = { musicas, vinhetas, timestamp: Date.now(), dataReferencia: new Date().toDateString() };
      localStorage.setItem('exna_playlist_cache', JSON.stringify(cacheObj));
    }

    function carregarPlaylistCache() {
      const cache = localStorage.getItem('exna_playlist_cache');
      if (!cache) return false;
      const obj = JSON.parse(cache);
      if (obj.dataReferencia === new Date().toDateString()) {
        musicas = obj.musicas;
        vinhetas = obj.vinhetas;
        return true;
      }
      return false;
    }

    async function carregarAutoDJ() {
      if (carregarPlaylistCache()) {
        modoVinhetaAtivo = (vinhetas.length > 0);
        calcularPontoInicial();
        iniciarPreloadProxima();
        atualizarPlaylistEmSegundoPlano();
        return;
      }
      await fetchPlaylistRemota();
    }

    async function fetchPlaylistRemota() {
      try {
        const arquivos = await listarArquivosDaPasta();
        const novasMusicas = [], novasVinhetas = [];
        
        for (const arq of arquivos) {
          if (isVinheta(arq.name)) {
            novasVinhetas.push(arq);
          } else {
            novasMusicas.push(arq);
          }
        }
        
        if (novasMusicas.length) {
          novasMusicas.sort((a,b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
          embaralharMusicas(novasMusicas);
          musicas = novasMusicas;
          vinhetas = novasVinhetas;
          modoVinhetaAtivo = (vinhetas.length > 0);
          salvarPlaylistCache();
          calcularPontoInicial();
          iniciarPreloadProxima();
        } else {
          txtFrase.innerText = "EXNA FM - NENHUMA MÚSICA ENCONTRADA";
        }
      } catch(erro) {
        console.error(erro);
        txtFrase.innerText = "EXNA FM - ERRO DE SINTONIA";
      }
    }

    async function atualizarPlaylistEmSegundoPlano() {
      try {
        const arquivos = await listarArquivosDaPasta();
        const novasMusicas = [], novasVinhetas = [];
        for (const arq of arquivos) {
          if (isVinheta(arq.name)) novasVinhetas.push(arq);
          else novasMusicas.push(arq);
        }
        if (novasMusicas.length && JSON.stringify(musicas) !== JSON.stringify(novasMusicas)) {
          novasMusicas.sort((a,b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
          embaralharMusicas(novasMusicas);
          musicas = novasMusicas;
          vinhetas = novasVinhetas;
          modoVinhetaAtivo = (vinhetas.length > 0);
          salvarPlaylistCache();
          if (!audio.paused && indiceMusicaAtual >= musicas.length) indiceMusicaAtual = 0;
        }
      } catch(e) {}
    }

    function embaralharMusicas(lista) {
      let dataHoje = new Date();
      let semente = dataHoje.getDate() + dataHoje.getMonth() + dataHoje.getFullYear();
      function rand() { let x = Math.sin(semente++) * 10000; return x - Math.floor(x); }
      for (let i = lista.length - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [lista[i], lista[j]] = [lista[j], lista[i]];
      }
    }

    function calcularPontoInicial() {
      if (jaSintonizouPrimeiraVez) return;
      if (musicas.length === 0) return;
      const agora = new Date();
      const segundosDia = (agora.getHours() * 3600) + (agora.getMinutes() * 60) + agora.getSeconds();
      const duracaoTotalGrade = musicas.length * DURACAO_FAIXA_ESTIMADA;
      const segundoAtualLoop = segundosDia % duracaoTotalGrade;
      indiceMusicaAtual = Math.floor(segundoAtualLoop / DURACAO_FAIXA_ESTIMADA);
      const offsetMusica = segundoAtualLoop % DURACAO_FAIXA_ESTIMADA;
      const musicaAtual = musicas[indiceMusicaAtual];
      audio.src = musicaAtual.url;
      audio.currentTime = offsetMusica;
      atualizarInterface(musicaAtual, false);
    }

    function iniciarPreloadProxima() {
      if (!modoVinhetaAtivo || vinhetas.length === 0) {
        let prox = musicas[(indiceMusicaAtual + 1) % musicas.length];
        if (prox) { proximoPreload = new Audio(); proximoPreload.src = prox.url; proximoPreload.load(); }
      } else {
        let v = vinhetas[Math.floor(Math.random() * vinhetas.length)];
        proximoPreload = new Audio(); proximoPreload.src = v.url; proximoPreload.load();
      }
    }

    function tocarProximaFaixa() {
      if (tocandoVinheta) {
        tocandoVinheta = false;
        indiceMusicaAtual = (indiceMusicaAtual + 1) % musicas.length;
        const proxMus = musicas[indiceMusicaAtual];
        if (proximoPreload && proximoPreload.src === proxMus.url) { audio.src = proximoPreload.src; proximoPreload = null; }
        else audio.src = proxMus.url;
        atualizarInterface(proxMus, false);
        audio.play().catch(e=>console.log(e));
        if (modoVinhetaAtivo && vinhetas.length) {
          let v = vinhetas[Math.floor(Math.random() * vinhetas.length)];
          proximoPreload = new Audio(); proximoPreload.src = v.url; proximoPreload.load();
        } else {
          let p = musicas[(indiceMusicaAtual + 1) % musicas.length];
          proximoPreload = new Audio(); proximoPreload.src = p.url; proximoPreload.load();
        }
      } else {
        if (modoVinhetaAtivo && vinhetas.length) {
          tocandoVinheta = true;
          let v = vinhetas[Math.floor(Math.random() * vinhetas.length)];
          if (proximoPreload && proximoPreload.src === v.url) { audio.src = proximoPreload.src; proximoPreload = null; }
          else audio.src = v.url;
          atualizarInterface(v, true);
          audio.play().catch(e=>console.log(e));
          let p = musicas[(indiceMusicaAtual + 1) % musicas.length];
          proximoPreload = new Audio(); proximoPreload.src = p.url; proximoPreload.load();
        } else {
          indiceMusicaAtual = (indiceMusicaAtual + 1) % musicas.length;
          const proxMus = musicas[indiceMusicaAtual];
          if (proximoPreload && proximoPreload.src === proxMus.url) { audio.src = proximoPreload.src; proximoPreload = null; }
          else audio.src = proxMus.url;
          atualizarInterface(proxMus, false);
          audio.play().catch(e=>console.log(e));
          if (modoVinhetaAtivo && vinhetas.length) {
            let v = vinhetas[Math.floor(Math.random() * vinhetas.length)];
            proximoPreload = new Audio(); proximoPreload.src = v.url; proximoPreload.load();
          } else {
            let p = musicas[(indiceMusicaAtual + 1) % musicas.length];
            proximoPreload = new Audio(); proximoPreload.src = p.url; proximoPreload.load();
          }
        }
      }
      iconePlay.className = "fas fa-pause";
      playerCard.classList.add('tocando');
      espectroLuz.classList.remove('carregando-espectro');
      espectroLuz.classList.add('animar');
    }

    audio.addEventListener('ended', () => tocarProximaFaixa());

    function comandarPlayer() {
      if (audio.paused) {
        iconePlay.className = "fas fa-spinner fa-spin";
        espectroLuz.classList.add('carregando-espectro');
        const agora = Date.now();
        const tempoPausado = (ultimoTimestampPlay > 0) ? (agora - ultimoTimestampPlay) / 1000 : 0;
        if (tempoPausado > 5 && jaSintonizouPrimeiraVez) {
          const agoraRelogio = new Date();
          const segundosDia = (agoraRelogio.getHours() * 3600) + (agoraRelogio.getMinutes() * 60) + agoraRelogio.getSeconds();
          const duracaoTotalGrade = musicas.length * DURACAO_FAIXA_ESTIMADA;
          const segundoAtualLoop = segundosDia % duracaoTotalGrade;
          const novoIndice = Math.floor(segundoAtualLoop / DURACAO_FAIXA_ESTIMADA);
          const novoOffset = segundoAtualLoop % DURACAO_FAIXA_ESTIMADA;
          if (novoIndice !== indiceMusicaAtual || Math.abs(audio.currentTime - novoOffset) > 2) {
            indiceMusicaAtual = novoIndice;
            const novaMusica = musicas[indiceMusicaAtual];
            audio.src = novaMusica.url;
            audio.currentTime = novoOffset;
            atualizarInterface(novaMusica, false);
            tocandoVinheta = false;
          }
        }
        audio.play().then(() => {
          iconePlay.className = "fas fa-pause";
          playerCard.classList.add('tocando');
          espectroLuz.classList.remove('carregando-espectro');
          espectroLuz.classList.add('animar');
          if (!jaSintonizouPrimeiraVez) jaSintonizouPrimeiraVez = true;
          ultimoTimestampPlay = Date.now();
        }).catch(err => { console.log(err); iconePlay.className = "fas fa-play"; espectroLuz.classList.remove('carregando-espectro'); });
      } else {
        audio.pause();
        iconePlay.className = "fas fa-play";
        playerCard.classList.remove('tocando');
        espectroLuz.classList.remove('animar');
        espectroLuz.classList.remove('carregando-espectro');
        ultimoTimestampPlay = Date.now();
      }
    }

    function tocarMusicaInicial() {
      if (musicas.length === 0) return;
      const musica = musicas[indiceMusicaAtual];
      audio.src = musica.url;
      atualizarInterface(musica, false);
      audio.play().then(() => {
        iconePlay.className = "fas fa-pause";
        playerCard.classList.add('tocando');
        espectroLuz.classList.add('animar');
        tocandoVinheta = false;
        jaSintonizouPrimeiraVez = true;
        ultimoTimestampPlay = Date.now();
        if (modoVinhetaAtivo && vinhetas.length) {
          let v = vinhetas[Math.floor(Math.random() * vinhetas.length)];
          proximoPreload = new Audio(); proximoPreload.src = v.url; proximoPreload.load();
        } else {
          let p = musicas[(indiceMusicaAtual + 1) % musicas.length];
          proximoPreload = new Audio(); proximoPreload.src = p.url; proximoPreload.load();
        }
      }).catch(e => console.log(e));
    }

    audio.addEventListener('playing', () => {
      if (iconePlay.className === "fas fa-spinner fa-spin") {
        iconePlay.className = "fas fa-pause";
        playerCard.classList.add('tocando');
        espectroLuz.classList.remove('carregando-espectro');
        espectroLuz.classList.add('animar');
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && audio.paused && iconePlay.className !== "fas fa-play") {
        if (musicas.length && !tocandoVinheta) {
          const agora = new Date();
          const segundosDia = (agora.getHours() * 3600) + (agora.getMinutes() * 60) + agora.getSeconds();
          const duracaoTotalGrade = musicas.length * DURACAO_FAIXA_ESTIMADA;
          const segundoAtualLoop = segundosDia % duracaoTotalGrade;
          const novoIndice = Math.floor(segundoAtualLoop / DURACAO_FAIXA_ESTIMADA);
          const novoOffset = segundoAtualLoop % DURACAO_FAIXA_ESTIMADA;
          if (novoIndice !== indiceMusicaAtual || Math.abs(audio.currentTime - novoOffset) > 2) {
            indiceMusicaAtual = novoIndice;
            const novaMusica = musicas[indiceMusicaAtual];
            audio.src = novaMusica.url;
            audio.currentTime = novoOffset;
            atualizarInterface(novaMusica, false);
          }
          audio.play().catch(e => console.log(e));
        }
      }
    });

    btnPlayLive.addEventListener('click', () => {
      if (musicas.length === 0) {
        fetchPlaylistRemota().then(() => tocarMusicaInicial());
      } else {
        comandarPlayer();
      }
    });

    carregarAutoDJ();
  })();
</script>
